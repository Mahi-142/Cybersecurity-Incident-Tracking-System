<!DOCTYPE html>
<html>
<head>

<title>Cybersecurity Incident Tracking System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">
Cybersecurity Incident Tracking System
</h1>

<div class="card p-4">

<form action="/add_incident" method="POST">

<label class="form-label">
Incident Title
</label>

<input
type="text"
name="title"
class="form-control"
required>

<br>

<label class="form-label">
Description
</label>

<textarea
name="description"
class="form-control"
rows="4">
</textarea>

<br>

<label class="form-label">
Severity
</label>

<select
name="severity"
class="form-select">

<option>Low</option>
<option>Medium</option>
<option>High</option>
<option>Critical</option>

</select>

<br>

<button
type="submit"
class="btn btn-primary">

Submit Incident

</button>

<a href="/incidents"
class="btn btn-success">

View Incidents

</a>

</form>

</div>

</div>

</body>
</html>
